name: Close linked issues on merge to develop

# GitHub's built-in "Fixes #N" / "Closes #N" auto-close only fires when a PR
# merges into the repository's default branch (main here). PRs in this repo
# merge into develop first, so this workflow re-implements the same keyword
# scan for that case. Merges into main still use GitHub's native behavior.
on:
  pull_request:
    types: [closed]
    branches: [develop]

jobs:
  close-issues:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Close issues referenced by closing keywords in the PR body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          issues=$(printf '%s' "$PR_BODY" \
            | grep -oiE '(close[sd]?|fix(e[sd])?|resolve[sd]?)[[:space:]]*:?[[:space:]]*#[0-9]+' \
            | grep -oE '[0-9]+' \
            | sort -un || true)
          if [ -z "$issues" ]; then
            echo "No closing keywords found in PR #$PR_NUMBER body."
            exit 0
          fi
          for num in $issues; do
            echo "Closing issue #$num (referenced by PR #$PR_NUMBER)"
            gh issue close "$num" --repo "$REPO" \
              --comment "Closed automatically: merged via #$PR_NUMBER into develop." \
              || echo "Could not close #$num (may not exist or already closed)"
          done
